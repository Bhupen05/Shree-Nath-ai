<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#b65b2f" />
    <meta name="application-name" content="SIBMS Console" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIBMS Console</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function cleanupLocalServiceWorkers() {
        var isLocalHost =
          window.location.hostname === 'localhost' ||
          window.location.hostname === '127.0.0.1';

        if (!isLocalHost || !('serviceWorker' in navigator)) {
          return;
        }

        navigator.serviceWorker.getRegistrations()
          .then(function (registrations) {
            if (!registrations.length) {
              return;
            }

            return Promise.all(
              registrations.map(function (registration) {
                return registration.unregister();
              })
            ).then(function () {
              var key = 'sibms-sw-cleanup-done';
              if (!sessionStorage.getItem(key)) {
                sessionStorage.setItem(key, '1');
                window.location.reload();
              }
            });
          })
          .catch(function () {
            // Ignore cleanup failures and continue boot.
          });
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
